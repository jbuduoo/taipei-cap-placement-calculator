<html lang="zh-Hant">
<head>
  <meta charset="utf-8">

  <title>115 會考基北區落點估算｜清爽藍綠版</title>
  <style>
    :root {
      --ink: #172026;
      --muted: #66737f;
      --line: #d8e0e7;
      --paper: #f7f9fb;
      --panel: #ffffff;
      --blue: #2f6fbd;
      --green: #25855a;
      --amber: #a86500;
      --red: #bc3b35;
      --violet: #6f55b5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
      line-height: 1.45;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }
    .wrap {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
    }
    .top {
      padding: 12px 0 10px;
    }
    h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 32px);
      letter-spacing: 0;
    }
    main {
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 18px;
      padding: 12px 0 24px;
      align-items: start;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .panel-title {
      margin: 0;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      font-size: 17px;
    }
    .inputs { padding: 14px 16px 16px; }
    .subject {
      display: grid;
      grid-template-columns: 88px 1fr 76px;
      gap: 10px;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid #edf1f5;
    }
    .subject:last-child { border-bottom: 0; }
    label {
      font-weight: 700;
      font-size: 14px;
    }
    input, select {
      width: 100%;
      height: 38px;
      border: 1px solid #c7d1da;
      border-radius: 6px;
      padding: 0 10px;
      color: var(--ink);
      background: #fff;
      font: inherit;
    }
    input:focus, select:focus {
      outline: 2px solid rgba(47, 111, 189, .18);
      border-color: var(--blue);
    }
    .level-pill {
      min-height: 38px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      font-weight: 800;
      border: 1px solid #cbd7e2;
      background: #f8fafc;
    }
    .level-A { color: var(--blue); background: #edf5ff; border-color: #b8d5f6; }
    .level-B { color: var(--green); background: #edf8f2; border-color: #b8dfca; }
    .level-C { color: var(--red); background: #fff0ef; border-color: #ecc2bf; }
    .small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }
    .mode {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }
    .mode button, .tools button {
      height: 38px;
      border: 1px solid #c7d1da;
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .mode button.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }
    .school-tabs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }
    .school-tabs button {
      height: 38px;
      border: 1px solid #c7d1da;
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .school-tabs button.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }
    .school-filters {
      display: grid;
      grid-template-columns: minmax(220px, 1fr);
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .school-filters[hidden] {
      display: none;
    }
    .filter-field label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .tools {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .tools button {
      flex: 1;
      background: #f7fafc;
    }
    .extra-grid button {
      width: 100%;
      height: 38px;
      border: 1px solid #c7d1da;
      background: #f7fafc;
      color: var(--ink);
      border-radius: 6px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .extra-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .extra-grid .full { grid-column: 1 / -1; }
    .converter {
      margin-top: 14px;
      border: 1px solid #dce5ec;
      border-radius: 8px;
      background: #fbfcfd;
      padding: 12px;
    }
    .converter h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }
    .converter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .converter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .converter button {
      width: 100%;
      height: 36px;
      border: 1px solid #c7d1da;
      border-radius: 6px;
      background: #fff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }
    .metric {
      border: 1px solid #dce5ec;
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      min-height: 74px;
    }
    .metric .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 5px;
    }
    .metric .value {
      font-size: 24px;
      font-weight: 900;
      line-height: 1.1;
    }
    .metric .note {
      color: var(--muted);
      font-size: 11px;
      margin-top: 5px;
    }
    .school-list {
      max-height: 680px;
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid #edf1f5;
      padding: 10px 12px;
      text-align: left;
      vertical-align: middle;
    }
    th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 1;
      color: #42505c;
      font-size: 13px;
    }
    td.num, th.num { text-align: right; }
    .status {
      display: inline-flex;
      min-width: 70px;
      justify-content: center;
      padding: 4px 7px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid transparent;
    }
    .stable { color: var(--green); background: #e9f7ef; border-color: #b9dfca; }
    .match { color: var(--blue); background: #ebf4ff; border-color: #b7d4f4; }
    .reach { color: var(--amber); background: #fff5e4; border-color: #edd2a2; }
    .hard { color: var(--muted); background: #f2f5f7; border-color: #d9e0e6; }
    .source {
      padding: 14px 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }
    .source a { color: var(--blue); text-decoration: none; }
    details {
      margin-top: 18px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    summary {
      cursor: pointer;
      padding: 12px 16px;
      font-weight: 800;
    }
    .grade-image {
      display: block;
      width: 100%;
      border-top: 1px solid var(--line);
    }
    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      .summary { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 620px) {
      .wrap { width: min(100vw - 20px, 1180px); }
      .subject { grid-template-columns: 78px 1fr 64px; gap: 8px; }
      .summary, .extra-grid, .converter-grid, .converter-row, .school-filters { grid-template-columns: 1fr; }
    }
      /* Theme: ocean */
    :root {
      --ink: #102a37;
      --muted: #5f7280;
      --line: #c9dce5;
      --paper: #eef7f8;
      --panel: #ffffff;
      --blue: #176fa8;
      --green: #18765f;
      --amber: #b26916;
      --red: #b04444;
      --violet: #5c6fc0;
    }
    header { background: #f8fcfd; }
    section { box-shadow: 0 1px 0 rgba(23, 111, 168, .08); }
    input:focus, select:focus { outline-color: rgba(23, 111, 168, .2); }
    .mode button.active, .school-tabs button.active { background: #12384a; border-color: #12384a; }
    .level-A, .match { color: #176fa8; background: #e7f4fb; border-color: #abd5ed; }
    .level-B, .stable { color: #18765f; background: #e7f6f0; border-color: #a9d9ca; }
    .reach { color: #a85d0e; background: #fff4e3; border-color: #ebc68d; }
  </style>
</head>

      scoredRows("高工/高商", "基隆市", "七堵區", "私立培德工家", [
        ["餐飲管理科"]
      ])
    ));

    let inputMode = "percent";
    let schoolCategory = "高中";
    const percentMax = { chinese: 42, social: 54, science: 50 };

    function fmt(value) {
      return Number(value).toFixed(1).replace(/\.0$/, "");
    }

    function fmtCutoff(value) {
      return Number.isFinite(value) ? fmt(value) : "";
    }

    function levelClass(level) {
      return level.startsWith("A") ? "level-A" : level.startsWith("B") ? "level-B" : "level-C";
    }

    function getLevel(subject, score) {
      const numeric = Number(score);
      if (Number.isNaN(numeric)) return "C";
      return ranges[subject].find(([, min, max]) => numeric >= min && numeric <= max)?.[0] || "C";
    }

    function percentToGradeInput(subject, percent) {
      const score = clampScore(percent, 0, 100);
      if (score === null) return 0;
      if (subject === "english" || subject === "math") return score;
      return Math.round((score / 100) * percentMax[subject]);
    }

    function setPill(id, level) {
      const el = document.getElementById(id);
      el.className = "level-pill " + levelClass(level);
      el.textContent = level;
    }

    function getLevels() {
      if (inputMode === "direct") {
        return Object.fromEntries(subjectIds.map(id => [id, document.getElementById(id + "Direct").value]));
      }
      return Object.fromEntries(subjectIds.map(id => {
        const converted = percentToGradeInput(id, document.getElementById(id + "Percent").value);
        return [id, getLevel(id, converted)];
      }));
    }

    function getWritingScore() {
      return writingPoints[document.getElementById("writingGrade").value] ?? 0;
    }

    function describeCombo(selectedLevels) {
      const counts = { A: 0, B: 0, C: 0 };
      Object.values(selectedLevels).forEach(level => {
        if (level.startsWith("A")) counts.A += 1;
        else if (level.startsWith("B")) counts.B += 1;
        else counts.C += 1;
      });
      return ["A", "B", "C"].filter(k => counts[k] > 0).map(k => `${counts[k]}${k}`).join("");
    }

    function plusMarks(selectedLevels) {
      return Object.values(selectedLevels).reduce((sum, level) => sum + (level.match(/\+/g) || []).length, 0);
    }

    function statusFor(diff) {
      if (diff >= 1) return ["相對穩", "stable"];
      if (diff >= 0) return ["可列入", "match"];
      if (diff >= -1) return ["高挑戰", "reach"];
      return ["差距較大", "hard"];
    }

    function update() {
      const selected = getLevels();
      subjectIds.forEach(id => {
        if (inputMode === "percent") setPill(id + "PercentLevel", selected[id]);
        const directPoint = document.getElementById(id + "DirectPoint");
        directPoint.textContent = levelPoints[document.getElementById(id + "Direct").value];
      });

      const fiveSubjectScore = subjectIds.reduce((sum, id) => sum + levelPoints[selected[id]], 0);
      const writingScore = getWritingScore();
      const examScore = fiveSubjectScore + writingScore;
      document.getElementById("writingPoint").textContent = fmt(writingScore);
      document.getElementById("examScore").textContent = fmt(examScore);
      document.getElementById("combo").textContent = describeCombo(selected);
      document.getElementById("plusCount").textContent = `+ 標示數 ${plusMarks(selected)}`;
      renderSchools(examScore);
    }

    function categoryLabel() {
      return schoolCategory;
    }

    function keywordList(value) {
      return value
        .trim()
        .split(/[\s,，、]+/)
        .map(item => item.trim())
        .filter(Boolean);
    }

    function searchableText(school) {
      return [school.ownership, school.city, school.area, school.name, school.department].join(" ");
    }

    function matchesAnyKeyword(text, keywords) {
      return keywords.length > 0 && keywords.some(keyword => text.includes(keyword));
    }

    function renderSchools(score) {
      const showPredicted = schoolCategory === "高中";
      document.getElementById("predictedHeader").hidden = !showPredicted;
      document.getElementById("schoolFilters").hidden = showPredicted;
      const searchTerms = showPredicted ? [] : keywordList(document.getElementById("keywordSearch").value);
      const hasActiveFilter = searchTerms.length > 0;
      const rows = schools
        .filter(school => school.category === schoolCategory)
        .map(school => {
          const referenceCutoff = [school.cutoff, school.cutoff114, school.cutoff113].find(Number.isFinite);
          const diff = Number.isFinite(referenceCutoff) ? score - referenceCutoff : null;
          const text = searchableText(school);
          const focus = matchesAnyKeyword([school.department, school.name].join(" "), searchTerms) ? 1 : 0;
          const [label, css] = diff === null ? ["無分數資料", "hard"] : statusFor(diff);
          return { ...school, referenceCutoff, diff, label, css, text, focus };
        })
        .filter(school => {
          if (school.diff !== null) return school.diff >= -1;
          return hasActiveFilter && (searchTerms.every(term => school.text.includes(term)) || school.focus === 1);
        })
        .filter(school => searchTerms.length === 0 || searchTerms.every(term => school.text.includes(term)))
        .sort((a, b) => {
          if (b.focus !== a.focus) return b.focus - a.focus;
          if ((b.diff !== null) !== (a.diff !== null)) return (b.diff !== null) - (a.diff !== null);
          const aCutoff = Number.isFinite(a.referenceCutoff) ? a.referenceCutoff : -Infinity;
          const bCutoff = Number.isFinite(b.referenceCutoff) ? b.referenceCutoff : -Infinity;
          return bCutoff - aCutoff || a.name.localeCompare(b.name, "zh-Hant") || a.department.localeCompare(b.department, "zh-Hant");
        });

      document.getElementById("schoolCount").textContent = rows.length;
      if (!rows.length) {
        document.getElementById("schoolRows").innerHTML = `<tr><td colspan="${showPredicted ? 9 : 8}">${categoryLabel()}目前沒有已匯入且符合落點的科別</td></tr>`;
        return;
      }
      document.getElementById("schoolRows").innerHTML = rows.map(school => `
        <tr>
          <td>${school.ownership}</td>
          <td>${school.city}</td>
          <td>${school.area}</td>
          <td>${school.name}</td>
          <td>${school.department}</td>
          <td class="num">${fmtCutoff(school.cutoff113)}</td>
          <td class="num">${fmtCutoff(school.cutoff114)}</td>
          ${showPredicted ? `<td class="num">${fmtCutoff(school.cutoff)}</td>` : ""}
          <td><span class="status ${school.css}">${school.label}</span></td>
        </tr>
      `).join("");
    }

    function fillDirectSelects() {
      subjectIds.forEach(id => {
        const select = document.getElementById(id + "Direct");
        select.innerHTML = levels.map(level => `<option value="${level}" ${level === "A" ? "selected" : ""}>${level}</option>`).join("");
      });
      document.getElementById("writingGrade").innerHTML = Object.entries(writingPoints)
        .map(([grade, point]) => `<option value="${grade}" ${grade === "5" ? "selected" : ""}>${grade}級分（${fmt(point)}分）</option>`)
        .join("");
    }

    function setMode(mode) {
      inputMode = mode;
      document.getElementById("percentInputs").hidden = mode !== "percent";
      document.getElementById("directInputs").hidden = mode !== "direct";
      document.getElementById("percentMode").classList.toggle("active", mode === "percent");
      document.getElementById("levelMode").classList.toggle("active", mode === "direct");
      update();
    }

    function setSchoolCategory(category) {
      schoolCategory = category;
      document.getElementById("highSchoolTab").classList.toggle("active", category === "高中");
      document.getElementById("vocationalTab").classList.toggle("active", category === "高工/高商");
      update();
    }

    function clampScore(value, min, max) {
      const numeric = Number(value);
      if (Number.isNaN(numeric)) return null;
      return Math.min(max, Math.max(min, numeric));
    }

    fillDirectSelects();
    document.querySelectorAll("input, select").forEach(el => el.addEventListener("input", update));
    document.getElementById("percentMode").addEventListener("click", () => setMode("percent"));
    document.getElementById("levelMode").addEventListener("click", () => setMode("direct"));
    document.getElementById("highSchoolTab").addEventListener("click", () => setSchoolCategory("高中"));
    document.getElementById("vocationalTab").addEventListener("click", () => setSchoolCategory("高工/高商"));
    update();
  </script>
</body>
</html>
